services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: ai-study-caddy
    restart: unless-stopped
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-https://localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-study-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: docker
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://ai_study:ai_study_pwd@postgres:5432/ai_study_db
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-study-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: docker
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://ai_study:ai_study_pwd@postgres:5432/ai_study_db
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    command: ["celery", "-A", "app.celery_app.celery_app", "worker", "-Q", "parse,ai_material,ai_target", "--loglevel=info", "--concurrency=2"]
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: ai-study-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_study
      POSTGRES_PASSWORD: ai_study_pwd
      POSTGRES_DB: ai_study_db
      TZ: Asia/Shanghai
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_study -d ai_study_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: ai-study-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  uploads_data:
